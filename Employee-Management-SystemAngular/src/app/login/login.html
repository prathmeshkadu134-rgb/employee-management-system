<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container col-md-4 mt-5">
        <div class="card shadow p-4">
            <h3 class="text-center text-success mb-3">Login</h3>
            <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" formControlName="firstName">
                </div>
                <div class="mb-3">
                    <label class="form-label">Date Of Birth</label>
                    <input type="text" class="form-control" formControlName="dob">
                </div>
                @if(errorMessage){
                    <div class="alert alert-danger small p-2">{{errorMessage}}</div>
                }
                <button type="submit" class="btn btn-success w-100" [disabled]="loginForm.invalid">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
